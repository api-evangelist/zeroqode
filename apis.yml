        type: Documentation
    description: >-
      Air Native is a conversion service that transforms Bubble web applications
      into native iOS and Android mobile apps. It delivers ready-made app builds
      within 24 hours (business days) at a one-time price of $299 for both
      Android and iOS. Includes push notification support via OneSignal and
      Firebase, supports Android 7.1+ and iOS 12.0+, and provides 3 free
      rebuilds within the first month.
