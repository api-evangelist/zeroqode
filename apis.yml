    description: >-
      Zeroqode offers 800+ Bubble plugins covering maps (Mapbox), charts (Apex
      Charts), payments (Stripe), media (PDF, video, audio), AI (OpenAI image
      generation), third-party API connectors (Salesforce, Podio, Spoonacular),
      mobile utilities, UI components, and automation tools. Plugins extend
      Bubble no-code applications with native-like capabilities without writing code.
